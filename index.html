<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Xem Giá Vàng - Gold Price Tracker</title>
    <meta name="description" content="Theo dõi giá vàng và bạc liên tục từ nhiều nguồn uy tín một cách nhanh chóng và chính xác.">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" href="/favicon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 16px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 24px;
            animation: slideDown 0.6s ease-out;
        }

        .header h1 {
            font-size: clamp(1.5rem, 8vw, 3rem);
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            word-break: break-word;
        }

        .header p {
            font-size: clamp(0.9rem, 4vw, 1.1rem);
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .update-time {
            color: #fff;
            font-size: 0.85em;
            opacity: 0.8;
            word-break: break-word;
        }

        .source-section {
            margin-bottom: 20px;
        }

        .source-title {
            color: white;
            margin: 10px 0;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .source-title span.badge {
            background: rgba(0,0,0,0.15);
            color: white;
            padding: 6px 10px;
            border-radius: 10px;
            font-weight: 600;
        }

        .table-wrapper {
            background: #fff9e6;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 500px;
        }

        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th {
            padding: clamp(12px, 3vw, 18px) clamp(8px, 2vw, 15px);
            text-align: left;
            font-weight: 600;
            font-size: clamp(0.75rem, 2.5vw, 0.95rem);
            white-space: nowrap;
        }

        td {
            padding: clamp(12px, 3vw, 15px) clamp(8px, 2vw, 15px);
            border-bottom: 1px solid #e0e0e0;
            font-size: clamp(0.8rem, 2.5vw, 0.95rem);
        }

        tbody tr {
            transition: all 0.3s ease;
        }

        tbody tr:hover {
            background-color: #fffef0;
        }

        @media (hover: hover) {
            tbody tr:hover {
                transform: scale(1.01);
            }
        }

        tbody tr.inactive {
            opacity: 0.6;
            background-color: #fffbf0;
        }

        .material-code {
            font-weight: 600;
            color: #667eea;
            min-width: 50px;
        }

        .material-name {
            font-weight: 500;
            color: #333;
        }

        .price-cell {
            text-align: right;
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }

        .price-buy {
            color: #2e7d32;
        }

        .price-sell {
            color: #c62828;
        }

        .price-range-percent {
            color: #777;
        }

        .type-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: clamp(0.7rem, 2vw, 0.85em);
            font-weight: 600;
            white-space: nowrap;
        }

        .type-badge.gold {
            background: #fff3cd;
            color: #856404;
        }

        .type-badge.silver {
            background: #d1ecf1;
            color: #0c5460;
        }

        .status-badge {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 5px;
            vertical-align: middle;
        }

        .status-active {
            background: #4caf50;
        }

        .status-inactive {
            background: #f44336;
        }

        .price-range {
            font-size: 0.9em;
            color: #666;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .no-data {
            text-align: center;
            padding: 40px 20px;
            color: #666;
            font-size: 1.1em;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: rgba(0,0,0,0.1);
            border: 2px solid white;
            border-radius: 12px;
            padding: clamp(16px, 4vw, 20px);
            color: white;
            text-align: center;
            backdrop-filter: blur(10px);
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .stat-card .stat-value {
            font-size: clamp(1.5rem, 5vw, 2rem);
            margin-bottom: 5px;
        }

        .stat-card p {
            opacity: 0.8;
            font-size: clamp(0.75rem, 2.5vw, 0.9em);
        }

        /* Mobile-first responsive styles */
        @media (max-width: 640px) {
            body {
                padding: 12px;
            }

            .container {
                padding: 0;
            }

            .header {
                margin-bottom: 16px;
            }

            .filter-section {
                gap: 6px;
                margin-bottom: 16px;
            }

            .filter-btn {
                padding: 10px 14px;
                font-size: 0.8rem;
                min-height: 40px;
                flex: 1 1 auto;
                min-width: 0;
            }

            th, td {
                padding: 10px 8px;
                font-size: 0.8rem;
            }

            th {
                font-size: 0.75rem;
            }

            .type-badge {
                padding: 3px 8px;
                font-size: 0.7rem;
            }

            .stat-card {
                padding: 12px;
                min-height: 90px;
            }

            .stat-card .stat-value {
                font-size: 1.5rem;
            }

            .stat-card p {
                font-size: 0.75rem;
            }

            .price-range span {
                display: block;
                font-size: 0.8rem;
            }

            /* Stack prices on very small screens */
            table {
                min-width: 400px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 8px;
            }

            .header h1 {
                font-size: 1.3rem;
            }

            .header p {
                font-size: 0.85rem;
            }

            .update-time {
                font-size: 0.8rem;
            }

            .filter-btn {
                font-size: 0.75rem;
                padding: 8px 12px;
                min-height: 38px;
            }

            table {
                min-width: 350px;
                font-size: 0.75rem;
            }

            th, td {
                padding: 8px 6px;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }

            .stat-card {
                padding: 10px;
                min-height: 80px;
            }

            .stat-card .stat-value {
                font-size: 1.3rem;
            }

            .stat-card p {
                font-size: 0.7rem;
            }
        }

        @media (max-width: 360px) {
            .header h1 {
                font-size: 1.1rem;
            }

            .header p {
                font-size: 0.8rem;
            }

            table {
                min-width: 320px;
            }

            th, td {
                padding: 6px 4px;
                font-size: 0.7rem;
            }
        }

        /* Landscape mode optimization */
        @media (max-height: 500px) and (orientation: landscape) {
            body {
                padding: 8px;
            }

            .header {
                margin-bottom: 12px;
            }

            .header h1 {
                font-size: 1.5rem;
                margin-bottom: 4px;
            }

            .header p {
                font-size: 0.9rem;
                margin-bottom: 4px;
            }

            .stats {
                margin-bottom: 12px;
                gap: 8px;
            }

            .stat-card {
                padding: 8px;
                min-height: auto;
            }

            .filter-section {
                margin-bottom: 12px;
                gap: 4px;
            }
        }

        /* High DPI displays */
        @media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
            .table-wrapper {
                border: 0.5px solid #e0e0e0;
            }
        }

        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            .table-wrapper {
                background: #2d2d2d;
                color: #e0e0e0;
            }

            th {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            }

            td {
                color: #e0e0e0;
                border-bottom-color: #444;
            }

            .material-name {
                color: #e0e0e0;
            }

            .price-buy {
                color: #66bb6a;
            }

            .price-sell {
                color: #f44336;
            }

            .price-range-percent {
                color: #aaa;
            }

            tbody tr:hover {
                background-color: #3a3a3a;
            }

            tbody tr.inactive {
                background-color: #252525;
            }

            .no-data {
                color: #aaa;
            }
        }
        .skip-link {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .skip-link:focus {
            position: static;
            width: auto;
            height: auto;
            padding: 8px 16px;
            margin: 0;
            overflow: visible;
            clip: auto;
            white-space: normal;
            z-index: 1000;
            background: #667eea;
            color: white;
            text-decoration: none;
        }
    </style>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GGYDT2S6GH"></script>
    <script>
      window.dataLayer = window.dataLayer || [];

      gtag('js', new Date());

</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <main class="container" id="main-content">
        <header class="header">
            <h1>💰 XEM GIÁ VÀNG</h1>
            <p>Cập nhật giá vàng liên tục từ nhiều nguồn uy tín</p>
            <div class="update-time" id="updateTime">&nbsp;</div>
        </header>

        <div class="stats" id="statsContainer"></div>

        <!-- GOLDPRICE SECTION -->
        <div class="source-section" id="goldpriceSection">
            <div class="source-title"><span class="badge">1</span> <strong>XAU & XAG</strong></div>
            <div class="table-wrapper">
                <table id="goldpriceTable">
                    <thead>
                        <tr>
                            <th>Mã</th>
                            <th>Tên sản phẩm</th>
                            <th>Loại</th>
                            <th class="price-cell">Giá hiện tại</th>
                            <th class="price-cell">Thay đổi 6 tháng</th>
                            <th class="price-cell">Thay đổi hôm nay</th>
                            <th class="price-cell">Giá đóng cửa</th>
                            <th>Trạng thái</th>
                        </tr>
                    </thead>
                    <tbody id="goldpriceBody">
                    </tbody>
                </table>
            </div>
        </div>

        <!-- DOJI SECTION -->
        <div class="source-section" id="dojiSection">
            <div class="source-title"><span class="badge">3</span> <strong>DOJI</strong></div>
            <div class="table-wrapper">
                <table id="dojiTable">
                    <thead>
                        <tr>
                            <th>Mã</th>
                            <th>Tên sản phẩm</th>
                            <th>Loại</th>
                            <th class="price-cell">Mua vào</th>
                            <th class="price-cell">Bán ra</th>
                            <th class="price-cell">Chênh lệch</th>
                            <th>Trạng thái</th>
                        </tr>
                    </thead>
                    <tbody id="dojiBody">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // Load three sources and render them vertically in the order: goldprice, sjc, doji
        async function fetchJsonSafe(url) {
            try {
                const resp = await fetch(url, {cache: 'no-store'});
                const text = await resp.text();
                // Try to parse JSON; if content is HTML or unparsable, return an object describing the error
                try {
                    const parsed = JSON.parse(text);
                    return { ok: true, data: parsed };
                } catch (e) {
                    return { ok: false, error: 'Invalid JSON', raw: text };
                }
            } catch (err) {
                return { ok: false, error: err.message };
            }
        }

        function formatNumber(v) {
            if (v === null || v === undefined || isNaN(v)) return '-';
            try { return Number(v).toLocaleString('vi-VN'); } catch (e) { return String(v); }
        }

        function renderGoldPrice(bodyElId, items) {
            const tbody = document.getElementById(bodyElId);
            if (!Array.isArray(items) || items.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="no-data">Không có dữ liệu</td></tr>';
                return;
            }

            const data = items[0];
            const rows = [
                { label: 'Vàng', code: 'XAU', type: 'gold', price: data.xauPrice, chg: data.chgXau, pc: data.pcXau, close: data.xauClose },
                { label: 'Bạc', code: 'XAG', type: 'silver', price: data.xagPrice, chg: data.chgXag, pc: data.pcXag, close: data.xagClose }
            ];

            tbody.innerHTML = rows.map(row => {
                const chgColor = row.chg != null ? (row.chg >= 0 ? '#4caf50' : '#f44336') : '#666';
                const pcColor = row.pc != null ? (row.pc >= 0 ? '#4caf50' : '#f44336') : '#666';
                const chgText = row.chg != null ? (row.chg > 0 ? '+' + formatNumber(row.chg) : formatNumber(row.chg)) : '-';
                const pcText = row.pc != null ? (row.pc > 0 ? '+' + row.pc.toFixed(3) + '%' : row.pc.toFixed(3) + '%') : '-';

                return `
                    <tr>
                        <td class="material-code">${escapeHtml(data.curr)}</td>
                        <td class="material-name">${escapeHtml(row.label)}</td>
                        <td><span class="type-badge ${row.type}">${row.label === 'Vàng' ? 'Vàng' : 'Bạc'}</span></td>
                        <td class="price-cell">${formatNumber(row.price)}</td>
                        <td class="price-cell" style="color: ${chgColor}">${chgText}</td>
                        <td class="price-cell" style="color: ${pcColor}">${pcText}</td>
                        <td class="price-cell">${formatNumber(row.close)}</td>
                        <td><span class="status-badge status-active"></span><span>Hoạt động</span></td>
                    </tr>
                `;
            }).join('');
        }

        function renderPricesInto(bodyElId, prices) {
            const tbody = document.getElementById(bodyElId);
            if (!Array.isArray(prices) || prices.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="no-data">Không có dữ liệu</td></tr>';
                return;
            }

            tbody.innerHTML = prices.map(price => {
                // Some sources may use different field names; fallback checks
                const code = price.materialCode || price.curr || price.code || '';
                const name = price.materialName || price.name || price.title || (price.curr ? price.curr + ' spot' : '—');
                const type = price.type || (price.curr && price.curr.toUpperCase() === 'USD' ? 'G' : price.type) || 'G';
                const buy = price.priceDojiBuyIn ?? price.buy ?? price.xauPrice ?? price.priceBuy ?? null;
                const sell = price.priceDojiSellOut ?? price.sell ?? price.xagPrice ?? price.priceSell ?? null;

                let diff = null;
                if (buy != null && sell != null && !isNaN(buy) && !isNaN(sell)) {
                    diff = sell - buy;
                }

                const statusClass = (price.isActive === true || price.isActive === undefined) ? '' : 'inactive';
                const typeBadge = (price.type === 'S' || type === 'S') ? 'silver' : 'gold';
                const typeLabel = (price.type === 'S' || type === 'S') ? 'Bạc' : 'Vàng';
                const statusDot = price.isActive === true ? 'status-active' : 'status-inactive';
                const statusText = price.isActive === true ? 'Hoạt động' : (price.isActive === false ? 'Ngừng' : '-');

                return `
                    <tr class="${statusClass}">
                        <td class="material-code">${code}</td>
                        <td class="material-name">${escapeHtml(name)}</td>
                        <td><span class="type-badge ${typeBadge}">${typeLabel}</span></td>
                        <td class="price-cell price-buy">${formatNumber(buy)}</td>
                        <td class="price-cell price-sell">${formatNumber(sell)}</td>
                        <td class="price-cell price-range">${diff !== null ? formatNumber(diff) : '-'}<span class="price-range-percent">(${diff !== null && buy ? ((diff / buy) * 100).toFixed(2) + '%' : '-'})</span></td>
                        <td>
                            <span class="status-badge ${statusDot}"></span><span>${statusText}</span>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function escapeHtml(s) {
            if (s === null || s === undefined) return '';
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function renderErrorInto(bodyElId, message, raw, colspan) {
            const tbody = document.getElementById(bodyElId);
            const short = escapeHtml(String(message).slice(0, 200));
            const col = colspan || 7;
            tbody.innerHTML = `<tr><td colspan="${col}" class="no-data">Lỗi tải dữ liệu: ${short}</td></tr>`;
            // Keep raw for debugging in console
            if (raw) console.warn('Raw response for', bodyElId, raw);
        }

        async function loadAll() {
            // Fetch all three in parallel
            const [gRes, dRes] = await Promise.all([
                fetchJsonSafe('gold_prices_goldprice.json'),
                fetchJsonSafe('gold_prices_doji.json')
            ]);

            // GOLDPRICE
            if (gRes.ok) {
                const gData = gRes.data && gRes.data.items ? gRes.data.items : gRes.data;
                renderGoldPrice('goldpriceBody', Array.isArray(gData) ? gData : []);
                if (gRes.data && gRes.data.ts) {
                    try { setUpdateTime(new Date(Number(gRes.data.ts))); } catch(e){}
                }
            } else {
                renderErrorInto('goldpriceBody', gRes.error || 'Invalid JSON', gRes.raw, 8);
            }

            // DOJI
            if (dRes.ok) {
                const dData = dRes.data;
                renderPricesInto('dojiBody', Array.isArray(dData) ? dData : (dData && dData.items ? dData.items : []));
                if (Array.isArray(dData) && dData.length > 0 && dData[0].updateDate) setUpdateTime(new Date(dData[0].updateDate));
            } else {
                renderErrorInto('dojiBody', dRes.error || 'Invalid JSON', dRes.raw);
            }

            updateStatsCombined();
        }

        function setUpdateTime(date) {
            try {
                if (!(date instanceof Date) || isNaN(date)) return;
                const formatted = date.toLocaleString('vi-VN', {
                    year: 'numeric', month: '2-digit', day: '2-digit',
                    hour: '2-digit', minute: '2-digit', second: '2-digit'
                });
                document.getElementById('updateTime').textContent = `Cập nhật: ${formatted}`;
            } catch (e) {}
        }

        function updateStatsCombined() {
            // Count total entries across three tables
            const goldpriceCount = document.getElementById('goldpriceBody').querySelectorAll('tr').length;
            const dojiCount = document.getElementById('dojiBody').querySelectorAll('tr').length;

            const total = [goldpriceCount, dojiCount].reduce((a,b)=>a+b,0);

            const statsHtml = `
                <div class="stat-card">
                    <div class="stat-value">${total}</div>
                    <p>Tổng hàng (tất cả nguồn)</p>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${goldpriceCount}</div>
                    <p>GoldPrice</p>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${dojiCount}</div>
                    <p>DOJI</p>
                </div>
            `;
            document.getElementById('statsContainer').innerHTML = statsHtml;
        }

        // Refresh data periodically
        async function refreshLoop() {
            await loadAll();
        }

        // Initial load and interval
        window.addEventListener('DOMContentLoaded', () => {
            refreshLoop();
            setInterval(refreshLoop, 300000); // every 5 minutes
        });
    </script>
</body>
</html>
